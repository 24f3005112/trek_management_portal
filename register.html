{% extends "base.html" %}
{% block title %}Join Portal{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 40px;">
    <div class="col-md-5">
        <div class="card" style="border: 1px solid #ced4da;">
            <div class="card-body p-4">
                <h4 class="mb-4">Create New Account</h4>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter your Full Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email ID</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Make a strong password" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contact Details</label>
                        <input type="text" name="contact_details" class="form-control" placeholder="Enter phone or contact information" required>
                    </div>

                    <div class="mb-4">
                        <label class="d-block mb-2 fw-bold">Choose a role:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" value="trekker" id="role_t" checked>
                            <label class="form-check-label" for="role_t">User (Trekker)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" value="staff" id="role_s">
                            <label class="form-check-label" for="role_s">Staff</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Register Now</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
