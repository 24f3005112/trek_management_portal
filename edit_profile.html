{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-3">
            <a href="{{ url_for('trekker_dashboard') }}" class="text-decoration-none small text-muted">Back to Dashboard</a>
        </div>

        <div class="card p-4 shadow-sm bg-white border">
            <h4>Update Profile Details</h4>
            <p class="text-muted small">Update your trekking attributes details.</p>

            <form action="{{ url_for('edit_profile') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ user_obj.Trekker_Name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Gender</label>
                    <input type="text" name="gender" class="form-control" value="{{ user_obj.gender }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Experience Level</label>
                    <input type="text" name="experience" class="form-control" value="{{ user_obj.experience }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Trekking History</label>
                    <textarea name="trek_history" class="form-control" required>{{ user_obj.trek_history }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Medical Conditions</label>
                    <input type="text" name="medical_condition" class="form-control" value="{{ user_obj.medical_condition }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Emergency Contact Name</label>
                    <input type="text" name="emergency_contact_name" class="form-control" value="{{ user_obj.emergency_contact_name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Emergency Contact Phone</label>
                    <input type="text" name="emergency_contact_phone" class="form-control" value="{{ user_obj.emergency_contact_phone }}" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                    <a href="{{ url_for('trekker_dashboard') }}" class="btn btn-light border">Discard Changes</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
